<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Engineering Test Portal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #2980b9; --bg: #f4f7f6; --card-bg: #ffffff; --error: #c0392b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); color: var(--primary); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 4px solid var(--accent); }
        h2 { text-align: center; margin-bottom: 25px; color: var(--primary); }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: 600; font-size: 0.85rem; margin-bottom: 5px; }
        input { padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 1rem; }
        button { background-color: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background-color: #1f6391; }
        .error-msg { color: var(--error); font-size: 0.85rem; text-align: center; margin-top: 10px; display: none; }
        .loader { text-align: center; display: none; margin-top: 10px; font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>⚙️ EngPortal Login</h2>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>
            <button type="submit" id="submitBtn">Login</button>
            <div id="loader" class="loader">Validating with Google Sheets...</div>
            <div id="errorMsg" class="error-msg"></div>
        </form>
    </div>

    <script>
        // PASTE YOUR DEPLOYED GOOGLE APPS SCRIPT WEB APP URL HERE:
        const API_URL = "https://script.google.com/macros/s/AKfycbz4qhGq7cFt6P3TSZ62X1jiN6wktvvh9wipAh5Nij1TIRy6YG4PPtJyzx9fXn-uOkel/exec";

        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            const loader = document.getElementById('loader');
            const submitBtn = document.getElementById('submitBtn');

            errorDiv.style.display = 'none';
            loader.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", username: username, password: password })
                });
                const result = await response.json();

                if (result.status === "success") {
                    localStorage.setItem('eng_portal_user', JSON.stringify(result.user));
                    window.location.href = 'index.html';
                } else {
                    errorDiv.innerText = result.message || "Invalid credentials";
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = "Network error or invalid API connection.";
                errorDiv.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
